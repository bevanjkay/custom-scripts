name: Release Bash Project

permissions: {}

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Project folder name (e.g., bible, fluro-songs, ghpr)"
        required: true
        type: string
      version:
        description: "New version number (e.g., 1.0.1)"
        required: true
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb
        with:
          deno-version: v2.x

      - name: Configure Git user
        id: git-user-config
        uses: Homebrew/actions/git-user-config@04a6d8cfe9d251e2afb78c5bdc6274ec9642aea2 # master
        with:
          username: bkdbot

      - name: Set up commit signing
        uses: Homebrew/actions/setup-commit-signing@04a6d8cfe9d251e2afb78c5bdc6274ec9642aea2 # master
        with:
          ssh: true
          signing_key: ${{ secrets.BKDBOT_SSH_SIGNING_KEY }}

      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ inputs.project }}-${{ inputs.version }}
          name: Release ${{ inputs.project }}-${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            ${{ inputs.project }}/${{ inputs.project }}
