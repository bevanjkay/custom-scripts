name: Release Bash Project

permissions: {}

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Project folder name (e.g., bible, fluro-songs, ghpr)"
        required: true
        type: string
      version:
        description: "New version number (e.g., 1.0.1)"
        required: true
        type: string

jobs:
  release:
    runs-on: macos-latest
    environment: github_actions
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: v2.x

      - name: Configure Git user
        id: git-user-config
        uses: Homebrew/actions/git-user-config@04a6d8cfe9d251e2afb78c5bdc6274ec9642aea2 # master
        with:
          username: bkdbot

      - name: Set up commit signing
        uses: Homebrew/actions/setup-commit-signing@04a6d8cfe9d251e2afb78c5bdc6274ec9642aea2 # master
        with:
          ssh: true
          signing_key: ${{ secrets.BKDBOT_SSH_SIGNING_KEY }}

      - name: Create Release
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          project: "${{ inputs.project }}"
          version: "${{ inputs.version }}"
        run: |
          gh release create "${project}-${version}" \
            "${project}/${project}" \
            --title "Release ${project}-${version}"
